    <h1>ITメモ</h1>
    <h2>Java</h2>
    ・ラッパー<br>
    何かの値や機能を“包んで扱うためのもの”<br>
    例えば下記のようなコードを<br>
    int x = 10;<br>
    ラップすると下記のようになる。<br>
    Integer x = 10;<br>
    intをIntegerが包んでいる。これが「ラッパー」。<br>
    ラッパー = 値をそのまま使わず、箱に入れて扱う仕組み。<br>
    Q.なんでわざわざ包むの？<br>
    A.追加の機能を持たせる<br>
    扱い方を制限できる<br>
    意味を持たせられる<br>
